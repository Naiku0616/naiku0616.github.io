<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="星泉Naiku-谐祈残篇" content="width=device-width, initial-scale=1.0">
    <title>星泉Naiku-谐祈残篇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }
        
        .audio-player {
            display: none; /* 隐藏音频播放器 */
        }
        
        .container {
            text-align: center;
            max-width: 1200px;
            width: 100%;
            z-index: 1;
        }
        
        .logo-container {
            margin: 0 auto 40px;
            padding: 30px;
            position: relative;
            max-width: 600px;
            width: 100%;
        }
        
        .logo-wrapper {
            display: inline-block;
            position: relative;
            padding: 40px;
            border-radius: 10px;
            animation: floatLogo 6s ease-in-out infinite;
        }
        
        @keyframes floatLogo {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(1deg);
            }
        }
        
        .logo {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.2));
            transition: all 0.5s ease;
        }
        
        .logo:hover {
            filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.4));
            transform: scale(1.05);
        }
        
        .glow-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0) 70%);
            animation: pulse 4s ease-in-out infinite alternate;
            z-index: -1;
        }
        
        @keyframes pulse {
            0% {
                opacity: 0.3;
                transform: scale(0.95);
            }
            100% {
                opacity: 0.7;
                transform: scale(1.05);
            }
        }
        
        .brand-name {
            font-size: 2.5rem;
            margin-top: 30px;
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            animation: fadeIn 2s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .tagline {
            font-size: 1.2rem;
            margin-top: 15px;
            color: #aaa;
            font-weight: 300;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
            animation: fadeIn 2s ease-out 0.5s both;
        }
        
        .footer {
            margin-top: 60px;
            color: #555;
            font-size: 0.9rem;
            text-align: center;
            animation: fadeIn 2s ease-out 1s both;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .brand-name {
                font-size: 1.8rem;
            }
            
            .tagline {
                font-size: 1rem;
            }
            
            .logo-container {
                padding: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .brand-name {
                font-size: 1.5rem;
            }
            
            .tagline {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- 隐藏的音乐播放器 -->
    <audio class="audio-player" id="backgroundMusic" loop>
        <!-- 请将src属性替换为您的音乐文件路径 -->
        <source src="Mist.mp3" type="audio/mpeg">
        您的浏览器不支持音频元素。
    </audio>
    
    <div class="container">
        <div class="logo-container">
            <div class="logo-wrapper">
                <div class="glow-effect"></div>
                <!-- 请将src属性替换为您的Logo图片路径 -->
                <img src="谐祈残篇.png" alt="Logo" class="logo">
            </div>
            <h1 class="brand-name">Fragments of Quinn</h1>
            <p class="tagline">星泉Naiku-WishMusicRecord音乐工作室</p>
        </div>
        
        <div class="footer">
            <p>&copy; 2025 邮箱:1327512009@qq.com</p>
        </div>
    </div>

    <script>
        // 自动播放背景音乐
        document.addEventListener('DOMContentLoaded', function() {
            const audio = document.getElementById('backgroundMusic');
            
            // 尝试自动播放
            const playPromise = audio.play();
            
            // 如果自动播放失败，等待用户与页面交互后再播放
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("自动播放失败，等待用户交互");
                    
                    // 当用户与页面交互时播放音乐
                    const playOnInteraction = function() {
                        audio.play();
                        document.removeEventListener('click', playOnInteraction);
                        document.removeEventListener('touchstart', playOnInteraction);
                    };
                    
                    document.addEventListener('click', playOnInteraction);
                    document.addEventListener('touchstart', playOnInteraction);
                });
            }
        });
    </script>
</body>
</html>
